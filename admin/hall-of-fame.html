<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หอเกียรติยศ — CCTMS Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/admin.css">
</head>
<body>
<script type="module">
import { mountAdminLayout } from '../src/components/adminLayout.js';
import { HallOfFameService } from '../src/services/HallOfFameService.js';
import { TeamService } from '../src/services/TeamService.js';
import { PlayerService } from '../src/services/PlayerService.js';
import { TournamentService } from '../src/services/TournamentService.js';
import { openModal, closeModal, confirmModal, emptyRow } from '../src/components/ui.js';
import { showToast } from '../src/utils/helpers.js';
import { TargetType } from '../src/utils/enums.js';

const ctx = mountAdminLayout({ title: 'หอเกียรติยศ' });
if (ctx) {
  const { content, session } = ctx;
  const tournaments = await TournamentService.list();
  const teams = await TeamService.list();
  const players = await PlayerService.list();

  content.innerHTML = `
    <div class="table-toolbar">
      <h2 style="font-size:1.2rem" class="m-0">รายการหอเกียรติยศ</h2>
      <button class="btn btn-felt btn-sm" id="addBtn"><i class="bi bi-plus-lg me-1"></i>เพิ่มรายการ</button>
    </div>
    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3" id="grid"></div>`;

  function targetOptions(type) {
    return type === TargetType.TEAM ? teams.map((t) => `<option value="${t.id}">${t.name}</option>`).join('') : players.map((p) => `<option value="${p.id}">${p.displayName}</option>`).join('');
  }

  function openForm() {
    openModal({
      title: 'เพิ่มรายการหอเกียรติยศ',
      bodyHtml: `
        <div class="mb-3"><label class="form-label">Tournament</label><select class="form-select" id="f_tour">${tournaments.map((t) => `<option value="${t.id}">${t.name}</option>`).join('')}</select></div>
        <div class="mb-3"><label class="form-label">ตำแหน่ง/รางวัล <span class="req">*</span></label><input class="form-control" id="f_title" placeholder="เช่น แชมป์ 2569, นักหมากรุกยอดเยี่ยม"></div>
        <div class="mb-3"><label class="form-label">ประเภท</label><select class="form-select" id="f_type"><option value="${TargetType.TEAM}">ทีม</option><option value="${TargetType.PLAYER}">ผู้เล่น</option></select></div>
        <div class="mb-3"><label class="form-label">เลือกทีม/ผู้เล่น <span class="req">*</span></label><select class="form-select" id="f_target">${targetOptions(TargetType.TEAM)}</select></div>
        <div class="mb-1"><label class="form-label">คำอธิบาย</label><textarea class="form-control" id="f_desc" rows="2"></textarea></div>`,
      buttons: [{ label: 'ยกเลิก', variant: 'btn-outline-secondary' }, { label: 'บันทึก', variant: 'btn-felt', close: false, onClick: async () => {
        const title = document.getElementById('f_title').value.trim();
        if (!title) { showToast('กรุณากรอกตำแหน่ง/รางวัล', 'error'); return; }
        await HallOfFameService.create({
          tournamentId: document.getElementById('f_tour').value, title,
          targetType: document.getElementById('f_type').value, targetId: document.getElementById('f_target').value,
          description: document.getElementById('f_desc').value.trim(),
        }, session.adminId);
        showToast('บันทึกสำเร็จ'); closeModal(); await render();
      }}],
    });
    document.getElementById('f_type').addEventListener('change', (e) => {
      document.getElementById('f_target').innerHTML = targetOptions(e.target.value);
    });
  }

  async function render() {
    const items = await HallOfFameService.list();
    if (!items.length) { document.getElementById('grid').innerHTML = `<div class="col-12">${emptyRow(1, 'ยังไม่มีรายการหอเกียรติยศ')}</div>`; return; }
    const cards = await Promise.all(items.map(async (h) => {
      const target = h.targetType === TargetType.TEAM ? await TeamService.get(h.targetId) : await PlayerService.get(h.targetId);
      return `<div class="col"><div class="app-card p-3">
        <div class="d-flex justify-content-between align-items-start">
          <div><div class="app-card__eyebrow mb-1">${h.title}</div><div class="fw-semibold text-dark">${target?.name || target?.displayName || '-'}</div><div class="small text-soft">${h.description || ''}</div></div>
          <button class="btn btn-sm btn-outline-danger" data-remove="${h.id}"><i class="bi bi-trash"></i></button>
        </div>
      </div></div>`;
    }));
    document.getElementById('grid').innerHTML = cards.join('');

    document.querySelectorAll('[data-remove]').forEach((b) => b.addEventListener('click', () => {
      confirmModal({ message: 'ลบรายการหอเกียรติยศนี้หรือไม่?', onConfirm: async () => { await HallOfFameService.remove(b.dataset.remove, session.adminId); showToast('ลบแล้ว'); await render(); } });
    }));
  }

  document.getElementById('addBtn').addEventListener('click', openForm);
  await render();
}
</script>
</body>
</html>
