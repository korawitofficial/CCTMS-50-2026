<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สถิติ / อันดับ — CCTMS Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/admin.css">
</head>
<body>
<script type="module">
import { mountAdminLayout } from '../src/components/adminLayout.js';
import { TournamentService } from '../src/services/TournamentService.js';
import { TeamService } from '../src/services/TeamService.js';
import { RankingService } from '../src/services/RankingService.js';
import { StatisticsService } from '../src/services/StatisticsService.js';
import { showToast } from '../src/utils/helpers.js';
import { emptyRow } from '../src/components/ui.js';

const ctx = mountAdminLayout({ title: 'สถิติ / อันดับ' });
if (ctx) {
  const { content, session } = ctx;
  const tournament = (await TournamentService.list())[0];

  content.innerHTML = `
    <div class="table-toolbar">
      <h2 style="font-size:1.2rem" class="m-0">อันดับทีม — ${tournament?.name || ''}</h2>
      <button class="btn btn-outline-felt btn-sm" id="recomputeBtn"><i class="bi bi-arrow-clockwise me-1"></i>คำนวณใหม่ทั้งหมด</button>
    </div>
    <div class="app-card p-0"><table class="app-table">
      <thead><tr><th>อันดับ</th><th>ทีม</th><th class="text-end">แข่ง</th><th class="text-end">ชนะ</th><th class="text-end">เสมอ</th><th class="text-end">แพ้</th><th class="text-end">อัตราชนะ</th><th class="text-end">คะแนน</th></tr></thead>
      <tbody id="rows"></tbody>
    </table></div>`;

  async function render() {
    const rankings = tournament ? await RankingService.list({ tournamentId: tournament.id }) : [];
    if (!rankings.length) { document.getElementById('rows').innerHTML = emptyRow(8, 'ยังไม่มีข้อมูลสถิติ'); return; }
    const trs = await Promise.all(rankings.map(async (r) => {
      const team = await TeamService.get(r.targetId);
      const stat = await StatisticsService.forTeam(r.targetId);
      return `<tr>
        <td><span class="rank-num ${r.rank === 1 ? 'rank-num--gold' : ''}">#${r.rank}</span></td>
        <td class="fw-semibold text-dark">${team?.name || '-'}</td>
        <td class="text-end">${stat?.totalMatch ?? 0}</td><td class="text-end">${stat?.win ?? 0}</td><td class="text-end">${stat?.draw ?? 0}</td><td class="text-end">${stat?.lose ?? 0}</td>
        <td class="text-end">${stat?.winRate ?? 0}%</td><td class="text-end fw-bold">${r.score}</td>
      </tr>`;
    }));
    document.getElementById('rows').innerHTML = trs.join('');
  }

  document.getElementById('recomputeBtn').addEventListener('click', async () => {
    const teams = await TeamService.list();
    for (const t of teams) await StatisticsService.recomputeTeam(t.id);
    if (tournament) await RankingService.recompute(tournament.id);
    showToast('คำนวณสถิติและอันดับใหม่แล้ว');
    await render();
  });

  await render();
  StatisticsService.subscribe({}, render);
  RankingService.subscribe({}, render);
}
</script>
</body>
</html>
