<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity / Audit Log — CCTMS Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/admin.css">
</head>
<body>
<script type="module">
import { mountAdminLayout } from '../src/components/adminLayout.js';
import { AdminService } from '../src/services/AdminService.js';
import { emptyRow } from '../src/components/ui.js';
import { formatDateTime } from '../src/utils/helpers.js';

const ctx = mountAdminLayout({ title: 'Activity / Audit Log' });
if (ctx) {
  const { content } = ctx;

  content.innerHTML = `
    <ul class="nav nav-tabs mb-3">
      <li class="nav-item"><button class="nav-link active" data-tab="activity">Activity Log</button></li>
      <li class="nav-item"><button class="nav-link" data-tab="audit">Audit Log</button></li>
    </ul>
    <div class="app-card p-0"><table class="app-table"><thead><tr><th>เวลา</th><th>ผู้ดำเนินการ</th><th>รายละเอียด</th></tr></thead><tbody id="rows"></tbody></table></div>`;

  async function render(tab) {
    const logs = tab === 'audit' ? await AdminService.listAuditLogs({ limit: 100 }) : await AdminService.listActivityLogs({ limit: 100 });
    document.getElementById('rows').innerHTML = logs.length ? logs.map((l) => `
      <tr>
        <td class="small font-mono">${formatDateTime(l.createdAt)}</td>
        <td class="small">${l.admin?.displayName || l.adminId}</td>
        <td class="small">${tab === 'audit' ? `แก้ไข ${l.targetType} (${l.targetId}) — เหตุผล: ${l.reason || '-'}` : l.description}</td>
      </tr>`).join('') : emptyRow(3, 'ยังไม่มีข้อมูล Log');
  }
  document.querySelectorAll('[data-tab]').forEach((t) => t.addEventListener('click', () => {
    document.querySelectorAll('[data-tab]').forEach((x) => x.classList.toggle('active', x === t));
    render(t.dataset.tab);
  }));
  await render('activity');
}
</script>
</body>
</html>
