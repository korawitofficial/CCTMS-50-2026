<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตาราง / รอบ / ห้องแข่ง — CCTMS Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/admin.css">
</head>
<body>
<script type="module">
import { mountAdminLayout } from '../src/components/adminLayout.js';
import { ScheduleService } from '../src/services/ScheduleService.js';
import { RoundService } from '../src/services/RoundService.js';
import { HallService } from '../src/services/HallService.js';
import { statusPill, openModal, closeModal, emptyRow } from '../src/components/ui.js';
import { showToast } from '../src/utils/helpers.js';
import { MatchStatus } from '../src/utils/enums.js';

const ctx = mountAdminLayout({ title: 'ตาราง / รอบ / ห้องแข่ง' });
if (ctx) {
  const { content, session } = ctx;

  content.innerHTML = `
    <ul class="nav nav-tabs mb-3">
      <li class="nav-item"><button class="nav-link active" data-tab="rounds">รอบการแข่งขัน</button></li>
      <li class="nav-item"><button class="nav-link" data-tab="halls">ห้อง/พื้นที่แข่งขัน</button></li>
    </ul>
    <div id="tabBody"></div>`;

  const tabs = document.querySelectorAll('[data-tab]');
  const body = document.getElementById('tabBody');

  async function roundsTab() {
    const rounds = await RoundService.list();
    return `
      <div class="table-toolbar"><div></div><button class="btn btn-felt btn-sm" id="addRoundBtn"><i class="bi bi-plus-lg me-1"></i>เพิ่มรอบ</button></div>
      <div class="app-card p-0"><table class="app-table"><thead><tr><th>รอบ</th><th>ลำดับ</th><th>สถานะ</th><th></th></tr></thead><tbody>
      ${rounds.length ? rounds.map((r) => `<tr>
        <td class="fw-semibold text-dark">${r.name}</td><td>${r.roundNumber}</td><td>${statusPill(r.status)}</td>
        <td class="text-end"><select class="form-select form-select-sm d-inline-block" style="width:140px" data-round-status="${r.id}">
          ${Object.values(MatchStatus).map((s) => `<option ${r.status === s ? 'selected' : ''}>${s}</option>`).join('')}
        </select></td>
      </tr>`).join('') : emptyRow(4, 'ยังไม่มีรอบการแข่งขัน')}
      </tbody></table></div>`;
  }

  async function hallsTab() {
    const halls = await HallService.list();
    return `
      <div class="table-toolbar"><div></div><button class="btn btn-felt btn-sm" id="addHallBtn"><i class="bi bi-plus-lg me-1"></i>เพิ่มห้องแข่งขัน</button></div>
      <div class="app-card p-0"><table class="app-table"><thead><tr><th>ชื่อห้อง</th><th>รายละเอียด</th><th>สถานะ</th></tr></thead><tbody>
      ${halls.length ? halls.map((h) => `<tr><td class="fw-semibold text-dark">${h.name}</td><td class="small">${h.description || '-'}</td><td>${statusPill(h.status)}</td></tr>`).join('') : emptyRow(3, 'ยังไม่มีห้องแข่งขัน')}
      </tbody></table></div>`;
  }

  async function render(tabName) {
    body.innerHTML = '<div class="skeleton" style="height:200px;border-radius:12px"></div>';
    body.innerHTML = tabName === 'halls' ? await hallsTab() : await roundsTab();
    if (tabName === 'halls') {
      document.getElementById('addHallBtn').addEventListener('click', () => {
        openModal({
          title: 'เพิ่มห้องแข่งขัน',
          bodyHtml: `<div class="mb-3"><label class="form-label">ชื่อห้อง <span class="req">*</span></label><input class="form-control" id="f_name"></div>
            <div class="mb-1"><label class="form-label">รายละเอียด</label><input class="form-control" id="f_desc"></div>`,
          buttons: [{ label: 'ยกเลิก', variant: 'btn-outline-secondary' }, { label: 'บันทึก', variant: 'btn-felt', close: false, onClick: async () => {
            const name = document.getElementById('f_name').value.trim();
            if (!name) { showToast('กรุณากรอกชื่อห้อง', 'error'); return; }
            const rounds = await RoundService.list();
            await HallService.create({ name, description: document.getElementById('f_desc').value.trim(), status: 'Active', roundId: rounds[0]?.id || null }, session.adminId);
            showToast('บันทึกสำเร็จ'); closeModal(); await render('halls');
          }}],
        });
      });
    } else {
      document.getElementById('addRoundBtn').addEventListener('click', async () => {
        const roundCount = (await RoundService.list()).length;
        openModal({
          title: 'เพิ่มรอบการแข่งขัน',
          bodyHtml: `<div class="mb-3"><label class="form-label">ชื่อรอบ <span class="req">*</span></label><input class="form-control" id="f_name"></div>
            <div class="mb-1"><label class="form-label">ลำดับรอบ</label><input type="number" class="form-control" id="f_num" value="${roundCount + 1}"></div>`,
          buttons: [{ label: 'ยกเลิก', variant: 'btn-outline-secondary' }, { label: 'บันทึก', variant: 'btn-felt', close: false, onClick: async () => {
            const name = document.getElementById('f_name').value.trim();
            if (!name) { showToast('กรุณากรอกชื่อรอบ', 'error'); return; }
            const scheds = await ScheduleService.list();
            await RoundService.create({ name, roundNumber: Number(document.getElementById('f_num').value), status: MatchStatus.SCHEDULED, scheduleId: scheds[0]?.id || null }, session.adminId);
            showToast('บันทึกสำเร็จ'); closeModal(); await render('rounds');
          }}],
        });
      });
      document.querySelectorAll('[data-round-status]').forEach((sel) => sel.addEventListener('change', async () => {
        await RoundService.setStatus(sel.dataset.roundStatus, sel.value, session.adminId);
        showToast('อัปเดตสถานะรอบแล้ว');
      }));
    }
  }
  tabs.forEach((t) => t.addEventListener('click', () => { tabs.forEach((x) => x.classList.toggle('active', x === t)); render(t.dataset.tab); }));
  await render('rounds');
}
</script>
</body>
</html>
