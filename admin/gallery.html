<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คลังภาพ — CCTMS Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/admin.css">
</head>
<body>
<script type="module">
import { mountAdminLayout } from '../src/components/adminLayout.js';
import { GalleryService } from '../src/services/GalleryService.js';
import { StorageService } from '../src/services/StorageService.js';
import { TournamentService } from '../src/services/TournamentService.js';
import { openModal, closeModal, confirmModal, emptyRow } from '../src/components/ui.js';
import { showToast, formatDate } from '../src/utils/helpers.js';

const ctx = mountAdminLayout({ title: 'คลังภาพ' });
if (ctx) {
  const { content, session } = ctx;
  const tournaments = await TournamentService.list();

  content.innerHTML = `
    <div class="table-toolbar">
      <h2 style="font-size:1.2rem" class="m-0">รูปภาพทั้งหมด</h2>
      <button class="btn btn-felt btn-sm" id="addBtn"><i class="bi bi-upload me-1"></i>อัปโหลดรูปภาพ</button>
    </div>
    <div class="row row-cols-2 row-cols-sm-3 row-cols-lg-5 g-3" id="grid"></div>`;

  function openForm() {
    openModal({
      title: 'อัปโหลดรูปภาพ',
      bodyHtml: `
        <div class="mb-3"><label class="form-label">Tournament</label><select class="form-select" id="f_tour">${tournaments.map((t) => `<option value="${t.id}">${t.name}</option>`).join('')}</select></div>
        <div class="mb-3"><label class="form-label">ไฟล์รูปภาพ <span class="req">*</span></label><input type="file" accept="image/*" class="form-control" id="f_file"></div>
        <div class="mb-1"><label class="form-label">คำบรรยายภาพ</label><input class="form-control" id="f_caption"></div>`,
      buttons: [{ label: 'ยกเลิก', variant: 'btn-outline-secondary' }, { label: 'อัปโหลด', variant: 'btn-felt', close: false, onClick: async () => {
        const file = document.getElementById('f_file').files[0];
        if (!file) { showToast('กรุณาเลือกไฟล์รูปภาพ', 'error'); return; }
        try {
          const uploaded = await StorageService.upload(file);
          await GalleryService.add({ tournamentId: document.getElementById('f_tour').value, imageUrl: uploaded.url, caption: document.getElementById('f_caption').value.trim() }, session.adminId);
          showToast('อัปโหลดสำเร็จ'); closeModal(); await render();
        } catch (e) { showToast(e.message, 'error'); }
      }}],
    });
  }

  async function render() {
    const items = await GalleryService.list();
    document.getElementById('grid').innerHTML = items.length ? items.map((g) => `
      <div class="col"><div class="app-card p-2">
        <div class="ratio ratio-1x1 rounded mb-2" style="background:${g.imageUrl ? `url(${g.imageUrl}) center/cover` : 'linear-gradient(135deg,var(--surface-2),var(--color-line))'};display:grid;place-items:center;color:var(--color-ink-soft)">${g.imageUrl ? '' : '<i class="bi bi-image fs-3"></i>'}</div>
        <div class="small text-dark">${g.caption || ''}</div>
        <div class="d-flex justify-content-between align-items-center mt-1"><span class="small text-soft">${formatDate(g.uploadedAt)}</span><button class="btn btn-sm btn-outline-danger py-0 px-1" data-remove="${g.id}"><i class="bi bi-trash small"></i></button></div>
      </div></div>`).join('') : `<div class="col-12">${emptyRow(1, 'ยังไม่มีภาพ')}</div>`;
    document.querySelectorAll('[data-remove]').forEach((b) => b.addEventListener('click', () => {
      confirmModal({ message: 'ลบภาพนี้หรือไม่?', onConfirm: async () => { await GalleryService.remove(b.dataset.remove, session.adminId); showToast('ลบแล้ว'); await render(); } });
    }));
  }
  document.getElementById('addBtn').addEventListener('click', openForm);
  await render();
}
</script>
</body>
</html>
