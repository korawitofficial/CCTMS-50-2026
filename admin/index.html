<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบผู้ดูแล — CCTMS Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/admin.css">
</head>
<body>
<div class="admin-login-shell">
  <div class="admin-login-card">
    <div class="text-center mb-4">
      <span class="brand-mark d-inline-grid" style="width:44px;height:44px;background:var(--color-brass);border-radius:8px;place-items:center;color:var(--color-felt-dark);font-weight:700;font-size:1.3rem;transform:rotate(45deg)"><span style="transform:rotate(-45deg)">♞</span></span>
      <h1 class="font-display mt-3 mb-1" style="font-size:1.4rem">CCTMS Admin</h1>
      <p class="text-soft small mb-0">เข้าสู่ระบบด้วยบัญชี Google ของโรงเรียน</p>
    </div>

    <button class="google-btn mb-2" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 01-1.8 2.72v2.26h2.9c1.7-1.57 2.68-3.87 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.83.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.96v2.33A9 9 0 009 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 013.68 9c0-.59.1-1.17.27-1.7V4.97H.96A9 9 0 000 9c0 1.45.35 2.83.96 4.03l3-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 00.96 4.97l3 2.33C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
      เข้าสู่ระบบด้วย Google
    </button>
    <div id="errorMsg" class="form-error text-center mb-2" style="display:none"></div>
    <p class="form-hint text-center mb-0">ต้องเป็นบัญชีที่เพิ่มไว้ในระบบ Admin แล้วเท่านั้น (ดูหน้า "ผู้ดูแล/สิทธิ์")</p>
  </div>
</div>
<script type="module">
import { AuthenticationService } from '../src/services/AuthenticationService.js';

if (AuthenticationService.isAuthenticated()) window.location.href = 'dashboard.html';

const errorMsg = document.getElementById('errorMsg');
document.getElementById('googleBtn').addEventListener('click', async () => {
  errorMsg.style.display = 'none';
  try {
    await AuthenticationService.signInWithGoogle();
    window.location.href = 'dashboard.html';
  } catch (e) {
    errorMsg.textContent = e.message;
    errorMsg.style.display = 'block';
  }
});
</script>
</body>
</html>
