<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จัดการทีม — CCTMS Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/admin.css">
</head>
<body>
<script type="module">
import { mountAdminLayout } from '../src/components/adminLayout.js';
import { TeamService } from '../src/services/TeamService.js';
import { TournamentService } from '../src/services/TournamentService.js';
import { PlayerService } from '../src/services/PlayerService.js';
import { statusPill, openModal, closeModal, confirmModal, emptyRow } from '../src/components/ui.js';
import { slugify, showToast } from '../src/utils/helpers.js';
import { TeamStatus, Visibility } from '../src/utils/enums.js';

const ctx = mountAdminLayout({ title: 'จัดการทีม' });
if (ctx) {
  const { content, session } = ctx;
  const tournaments = await TournamentService.list();

  content.innerHTML = `
    <div class="table-toolbar">
      <h2 style="font-size:1.2rem" class="m-0">รายการทีม</h2>
      <button class="btn btn-felt btn-sm" id="addBtn"><i class="bi bi-plus-lg me-1"></i>เพิ่มทีม</button>
    </div>
    <div class="app-card p-0"><table class="app-table">
      <thead><tr><th>ทีม</th><th>Tournament</th><th>ผู้เล่น</th><th>สถานะ</th><th></th></tr></thead>
      <tbody id="rows"></tbody>
    </table></div>`;

  function formHtml(t = {}) {
    return `
      <div class="mb-3"><label class="form-label">Tournament <span class="req">*</span></label>
        <select class="form-select" id="f_tour">${tournaments.map((tt) => `<option value="${tt.id}" ${t.tournamentId === tt.id ? 'selected' : ''}>${tt.name}</option>`).join('')}</select></div>
      <div class="mb-3"><label class="form-label">ชื่อทีม <span class="req">*</span></label><input class="form-control" id="f_name" value="${t.name || ''}"></div>
      <div class="row g-2 mb-3">
        <div class="col-6"><label class="form-label">สี</label><input type="color" class="form-control form-control-color w-100" id="f_color" value="${t.color || '#1F3D2E'}"></div>
        <div class="col-6"><label class="form-label">โรงเรียน</label><input class="form-control" id="f_school" value="${t.school || ''}"></div>
      </div>
      <div class="mb-1"><label class="form-label">สถานะ</label>
        <select class="form-select" id="f_status">${Object.values(TeamStatus).map((s) => `<option ${t.status === s ? 'selected' : ''}>${s}</option>`).join('')}</select></div>`;
  }

  function openForm(existing) {
    openModal({
      title: existing ? 'แก้ไขทีม' : 'เพิ่มทีมใหม่',
      bodyHtml: formHtml(existing || {}),
      buttons: [
        { label: 'ยกเลิก', variant: 'btn-outline-secondary' },
        { label: 'บันทึก', variant: 'btn-felt', close: false, onClick: async () => {
          const name = document.getElementById('f_name').value.trim();
          if (!name) { showToast('กรุณากรอกชื่อทีม', 'error'); return; }
          const data = {
            tournamentId: document.getElementById('f_tour').value,
            name, slug: existing?.slug || slugify(name),
            color: document.getElementById('f_color').value,
            school: document.getElementById('f_school').value.trim(),
            status: document.getElementById('f_status').value,
            visibility: Visibility.PUBLIC,
          };
          if (existing) await TeamService.update(existing.id, data, session.adminId);
          else await TeamService.create(data, session.adminId);
          showToast('บันทึกสำเร็จ'); closeModal(); await render();
        }},
      ],
    });
  }

  async function render() {
    const rows = await TeamService.list();
    const trs = await Promise.all(rows.map(async (t) => {
      const [tour, players] = await Promise.all([TournamentService.get(t.tournamentId), PlayerService.list({ teamId: t.id })]);
      return `<tr>
        <td><div class="d-flex align-items-center gap-2"><span style="width:10px;height:10px;border-radius:2px;background:${t.color}"></span><span class="fw-semibold text-dark">${t.name}</span></div></td>
        <td class="small">${tour?.name || '-'}</td>
        <td>${players.length}</td>
        <td>${statusPill(t.status)}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-secondary" data-edit="${t.id}"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger" data-hide="${t.id}"><i class="bi bi-eye-slash"></i></button>
        </td>
      </tr>`;
    }));
    document.getElementById('rows').innerHTML = trs.length ? trs.join('') : emptyRow(5, 'ยังไม่มีทีม');
    document.querySelectorAll('[data-edit]').forEach((b) => b.addEventListener('click', async () => openForm(await TeamService.get(b.dataset.edit))));
    document.querySelectorAll('[data-hide]').forEach((b) => b.addEventListener('click', () => {
      confirmModal({ message: 'ซ่อนทีมนี้หรือไม่?', onConfirm: async () => { await TeamService.hide(b.dataset.hide, session.adminId); showToast('ซ่อนแล้ว'); await render(); } });
    }));
  }
  document.getElementById('addBtn').addEventListener('click', () => openForm());
  await render();
}
</script>
</body>
</html>
