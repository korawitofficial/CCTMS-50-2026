<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คลังภาพ — CCTMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/main.css">
</head>
<body>
<main>
  <section class="py-4" style="background:var(--surface-2);border-bottom:1px solid var(--color-line)">
    <div class="container-xl"><h1 style="font-size:1.8rem" class="mb-1">คลังภาพ</h1><p class="text-soft mb-0">บันทึกภาพบรรยากาศการแข่งขัน</p></div>
  </section>
  <section class="section"><div class="container-xl"><div class="row row-cols-2 row-cols-sm-3 row-cols-lg-4 g-3" id="galleryGrid"></div></div></section>
</main>
<script type="module">
import { mountPublicLayout, emptyState } from '../src/components/publicLayout.js';
import { GalleryService } from '../src/services/GalleryService.js';
import { formatDate } from '../src/utils/helpers.js';

await mountPublicLayout({ breadcrumb: [{ label: 'หน้าแรก', href: 'index.html' }, { label: 'ภาพกิจกรรม' }] });

const items = await GalleryService.list();
const grid = document.getElementById('galleryGrid');
grid.innerHTML = items.length ? items.map((g) => `
  <div class="col"><div class="app-card p-2">
    <div class="ratio ratio-1x1 rounded mb-2" style="background:${g.imageUrl ? `url(${g.imageUrl}) center/cover` : 'linear-gradient(135deg,var(--surface-2),var(--color-line))'};display:grid;place-items:center;color:var(--color-ink-soft)">${g.imageUrl ? '' : '<i class="bi bi-image fs-3"></i>'}</div>
    <div class="small text-dark fw-medium">${g.caption || ''}</div>
    <div class="small text-soft">${formatDate(g.uploadedAt)}</div>
  </div></div>`).join('') : `<div class="col-12">${emptyState('ยังไม่มีภาพกิจกรรม', 'bi-images')}</div>`;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
