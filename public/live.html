<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ถ่ายทอดสด — CCTMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/main.css">
</head>
<body>
<main>
  <section class="py-4" style="background:var(--color-felt-dark);border-bottom:3px solid var(--color-brass)">
    <div class="container-xl">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
          <h1 class="text-white mb-0" style="font-size:1.6rem">ถ่ายทอดสด</h1>
          <p class="text-white-50 small mb-0">อัปเดตแบบเรียลไทม์ทุกกระดาน</p>
        </div>
        <div class="d-flex gap-2 flex-wrap align-items-center">
          <select class="form-select form-select-sm" id="hallFilter" style="width:auto"></select>
          <div class="btn-group btn-group-sm" role="group" id="layoutGroup">
            ${[4,6,8,12,16].map((n) => `<button class="btn btn-outline-light" data-layout="${n}">${n}</button>`).join('')}
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container-xl">
      <div class="row g-3" id="liveGrid"></div>
    </div>
  </section>
</main>

<script type="module">
import { mountPublicLayout, emptyState } from '../src/components/publicLayout.js';
import { BoardService } from '../src/services/BoardService.js';
import { HallService } from '../src/services/HallService.js';
import { MatchService } from '../src/services/MatchService.js';
import { PlayerService } from '../src/services/PlayerService.js';
import { TeamService } from '../src/services/TeamService.js';
import { renderBoardHtml } from '../src/utils/chessBoard.js';
import { statusPill } from '../src/components/ui.js';
import { getQueryParam, setQueryParam } from '../src/utils/helpers.js';

await mountPublicLayout({ breadcrumb: [{ label: 'หน้าแรก', href: 'index.html' }, { label: 'ถ่ายทอดสด' }] });

let layout = Number(getQueryParam('layout', 8));
let hallFilter = getQueryParam('hall', '');

const halls = await HallService.list();
const hallSelect = document.getElementById('hallFilter');
hallSelect.innerHTML = `<option value="">ทุกห้องแข่งขัน</option>` + halls.map((h) => `<option value="${h.id}" ${h.id === hallFilter ? 'selected' : ''}>${h.name}</option>`).join('');
hallSelect.addEventListener('change', () => { hallFilter = hallSelect.value; setQueryParam('hall', hallFilter); render(); });

document.querySelectorAll('[data-layout]').forEach((btn) => {
  btn.classList.toggle('active', Number(btn.dataset.layout) === layout);
  btn.addEventListener('click', () => {
    layout = Number(btn.dataset.layout);
    setQueryParam('layout', layout);
    document.querySelectorAll('[data-layout]').forEach((b) => b.classList.toggle('active', b === btn));
    render();
  });
});

async function boardCell(board) {
  const match = board.currentMatchId ? await MatchService.get(board.currentMatchId) : null;
  const colClass = layout <= 4 ? 'col-12 col-md-6' : layout <= 8 ? 'col-12 col-sm-6 col-lg-3' : layout <= 12 ? 'col-6 col-lg-3' : 'col-6 col-lg-3 col-xl-2';
  if (!match) {
    return `<div class="${colClass}"><div class="board-card h-100 d-flex flex-column align-items-center justify-content-center text-center" style="min-height:180px;opacity:.55">
      <span class="badge-soft mb-2" style="background:rgba(255,255,255,0.1);color:#fff">${board.name}</span>
      <i class="bi bi-dash-circle fs-4"></i><div class="small mt-1">ว่าง</div></div></div>`;
  }
  const [white, black, whiteTeam, blackTeam] = await Promise.all([
    PlayerService.get(match.whitePlayerId), PlayerService.get(match.blackPlayerId),
    TeamService.get(match.whiteTeamId), TeamService.get(match.blackTeamId),
  ]);
  return `<div class="${colClass}">
    <a href="match.html?id=${match.id}" class="text-decoration-none">
    <div class="board-card h-100">
      <div class="board-card__head">
        <span class="badge-soft" style="background:rgba(255,255,255,0.1);color:#fff">${board.name}</span>
        ${statusPill(match.status)}
      </div>
      ${renderBoardHtml(match.currentPosition, {})}
      <div class="board-card__players">
        <div class="player-chip"><span class="player-chip__swatch" style="background:${whiteTeam?.color}"></span>${white?.displayName || '-'}</div>
        <div class="player-chip">${black?.displayName || '-'}<span class="player-chip__swatch" style="background:${blackTeam?.color}"></span></div>
      </div>
    </div>
    </a>
  </div>`;
}

async function render() {
  const filters = hallFilter ? { hallId: hallFilter } : {};
  const boards = (await BoardService.list(filters)).slice(0, layout);
  const grid = document.getElementById('liveGrid');
  if (!boards.length) { grid.innerHTML = emptyState('ไม่พบกระดานในเงื่อนไขที่เลือก', 'bi-grid-3x3'); return; }
  grid.innerHTML = (await Promise.all(boards.map(boardCell))).join('');
}
await render();
BoardService.subscribe({}, render);
MatchService.subscribe({}, render);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
