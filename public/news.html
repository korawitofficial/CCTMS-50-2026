<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ข่าวสาร — CCTMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/main.css">
</head>
<body>
<main>
  <section class="py-4" style="background:var(--surface-2);border-bottom:1px solid var(--color-line)">
    <div class="container-xl"><h1 style="font-size:1.8rem" class="mb-1">ข่าวสาร</h1><p class="text-soft mb-0">ความเคลื่อนไหวล่าสุดของการแข่งขัน</p></div>
  </section>
  <section class="section"><div class="container-xl"><div class="d-flex flex-column gap-3" id="newsList" style="max-width:820px"></div></div></section>
</main>
<script type="module">
import { mountPublicLayout, emptyState } from '../src/components/publicLayout.js';
import { NewsService } from '../src/services/NewsService.js';
import { formatDate } from '../src/utils/helpers.js';

await mountPublicLayout({ breadcrumb: [{ label: 'หน้าแรก', href: 'index.html' }, { label: 'ข่าวสาร' }] });

const items = await NewsService.list();
const list = document.getElementById('newsList');
list.innerHTML = items.length ? items.map((n) => `
  <article class="app-card p-4">
    <div class="text-soft small mb-2"><i class="bi bi-calendar3 me-1"></i>${formatDate(n.publishedAt)}</div>
    <h2 style="font-size:1.3rem" class="mb-2">${n.title}</h2>
    <p class="text-soft mb-0">${n.content}</p>
  </article>`).join('') : emptyState('ยังไม่มีข่าวสาร', 'bi-newspaper');
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
