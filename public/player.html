<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>โปรไฟล์ผู้เล่น — CCTMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/main.css">
</head>
<body>
<main><section class="section" id="playerSection"><div class="container-xl"><div class="skeleton" style="height:300px;border-radius:16px"></div></div></section></main>
<script type="module">
import { mountPublicLayout, emptyState } from '../src/components/publicLayout.js';
import { PlayerService } from '../src/services/PlayerService.js';
import { TeamService } from '../src/services/TeamService.js';
import { ResultService } from '../src/services/ResultService.js';
import { statusPill } from '../src/components/ui.js';
import { getQueryParam, initials } from '../src/utils/helpers.js';

await mountPublicLayout({ breadcrumb: [{ label: 'หน้าแรก', href: 'index.html' }, { label: 'ผู้เล่น', href: 'players.html' }, { label: 'โปรไฟล์' }] });

const slug = getQueryParam('slug');
const player = await PlayerService.getBySlug(slug);
const section = document.getElementById('playerSection');

if (!player) {
  section.innerHTML = `<div class="container-xl">${emptyState('ไม่พบผู้เล่นนี้', 'bi-exclamation-circle')}</div>`;
} else {
  const team = await TeamService.get(player.teamId);
  const matches = await PlayerService.matchHistory(player.id);
  let win = 0, draw = 0, lose = 0;

  const matchRows = await Promise.all(matches.map(async (m) => {
    const isWhite = m.whitePlayerId === player.id;
    const opponent = await PlayerService.get(isWhite ? m.blackPlayerId : m.whitePlayerId);
    const result = m.resultId ? await ResultService.get(m.id) : null;
    if (result) {
      if (result.resultType === 'Draw') draw++;
      else if ((result.winner === 'White') === isWhite) win++;
      else lose++;
    }
    return `<tr>
      <td><a href="match.html?id=${m.id}" class="text-dark text-decoration-none">vs ${opponent?.displayName || '-'}</a></td>
      <td>${isWhite ? 'ขาว' : 'ดำ'}</td><td>${statusPill(m.status)}</td><td>${result ? result.resultType : '-'}</td>
    </tr>`;
  }));

  section.innerHTML = `<div class="container-xl">
    <div class="app-card p-4 mb-4 d-flex align-items-center gap-4 flex-wrap">
      <div class="avatar-circle" style="width:72px;height:72px;font-size:1.5rem;background:${team?.color || 'var(--color-felt)'}">${initials(player.displayName)}</div>
      <div class="flex-grow-1">
        <h1 style="font-size:1.6rem" class="mb-1">${player.displayName}</h1>
        <div class="text-soft small">${team ? `<a href="team.html?slug=${team.slug}">${team.name}</a>` : ''} · เลขประจำตัว ${player.studentId || '-'}</div>
        <div class="mt-2">${statusPill(player.status)}</div>
      </div>
      <div class="d-flex gap-3 text-center">
        <div><div class="fs-4 fw-bold text-success">${win}</div><div class="small text-soft">ชนะ</div></div>
        <div><div class="fs-4 fw-bold text-soft">${draw}</div><div class="small text-soft">เสมอ</div></div>
        <div><div class="fs-4 fw-bold" style="color:var(--color-lacquer)">${lose}</div><div class="small text-soft">แพ้</div></div>
      </div>
    </div>
    <h3 style="font-size:1.15rem" class="mb-3">ประวัติการแข่งขัน</h3>
    <div class="app-card p-0">
      <table class="app-table"><thead><tr><th>คู่แข่งขัน</th><th>ฝ่าย</th><th>สถานะ</th><th>ผล</th></tr></thead><tbody>
      ${matchRows.length ? matchRows.join('') : `<tr><td colspan="4">${emptyState('ยังไม่มีประวัติการแข่งขัน')}</td></tr>`}
      </tbody></table>
    </div>
  </div>`;
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
