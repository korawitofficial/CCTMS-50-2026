<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จัดการข่าวสาร — CCTMS Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/admin.css">
</head>
<body>
<script type="module">
import { mountAdminLayout } from '../src/components/adminLayout.js';
import { NewsService } from '../src/services/NewsService.js';
import { TournamentService } from '../src/services/TournamentService.js';
import { openModal, closeModal, confirmModal, emptyRow } from '../src/components/ui.js';
import { showToast, formatDate } from '../src/utils/helpers.js';

const ctx = mountAdminLayout({ title: 'จัดการข่าวสาร' });
if (ctx) {
  const { content, session } = ctx;
  const tournaments = await TournamentService.list();

  content.innerHTML = `
    <div class="table-toolbar">
      <h2 style="font-size:1.2rem" class="m-0">รายการข่าว</h2>
      <button class="btn btn-felt btn-sm" id="addBtn"><i class="bi bi-plus-lg me-1"></i>เขียนข่าวใหม่</button>
    </div>
    <div class="app-card p-0"><table class="app-table"><thead><tr><th>หัวข้อข่าว</th><th>วันที่เผยแพร่</th><th></th></tr></thead><tbody id="rows"></tbody></table></div>`;

  function openForm() {
    openModal({
      title: 'เขียนข่าวใหม่',
      bodyHtml: `
        <div class="mb-3"><label class="form-label">Tournament</label><select class="form-select" id="f_tour">${tournaments.map((t) => `<option value="${t.id}">${t.name}</option>`).join('')}</select></div>
        <div class="mb-3"><label class="form-label">หัวข้อข่าว <span class="req">*</span></label><input class="form-control" id="f_title"></div>
        <div class="mb-1"><label class="form-label">เนื้อหา <span class="req">*</span></label><textarea class="form-control" id="f_content" rows="5"></textarea></div>`,
      buttons: [{ label: 'ยกเลิก', variant: 'btn-outline-secondary' }, { label: 'เผยแพร่', variant: 'btn-felt', close: false, onClick: async () => {
        const title = document.getElementById('f_title').value.trim();
        const contentTxt = document.getElementById('f_content').value.trim();
        if (!title || !contentTxt) { showToast('กรุณากรอกหัวข้อและเนื้อหาข่าว', 'error'); return; }
        await NewsService.create({ tournamentId: document.getElementById('f_tour').value, title, content: contentTxt, coverImage: '' }, session.adminId);
        showToast('เผยแพร่ข่าวสำเร็จ'); closeModal(); await render();
      }}],
    });
  }

  async function render() {
    const items = await NewsService.list();
    document.getElementById('rows').innerHTML = items.length ? items.map((n) => `
      <tr><td><div class="fw-semibold text-dark">${n.title}</div><div class="small text-soft">${n.content.slice(0, 80)}...</div></td>
      <td class="small">${formatDate(n.publishedAt)}</td>
      <td class="text-end"><button class="btn btn-sm btn-outline-danger" data-remove="${n.id}"><i class="bi bi-trash"></i></button></td></tr>`).join('') : emptyRow(3, 'ยังไม่มีข่าวสาร');
    document.querySelectorAll('[data-remove]').forEach((b) => b.addEventListener('click', () => {
      confirmModal({ message: 'ลบข่าวนี้หรือไม่?', onConfirm: async () => { await NewsService.remove(b.dataset.remove, session.adminId); showToast('ลบแล้ว'); await render(); } });
    }));
  }
  document.getElementById('addBtn').addEventListener('click', openForm);
  await render();
}
</script>
</body>
</html>
