<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จัดการผู้เล่น — CCTMS Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/admin.css">
</head>
<body>
<script type="module">
import { mountAdminLayout } from '../src/components/adminLayout.js';
import { PlayerService } from '../src/services/PlayerService.js';
import { TeamService } from '../src/services/TeamService.js';
import { statusPill, openModal, closeModal, confirmModal, emptyRow, paginate, renderPagination } from '../src/components/ui.js';
import { slugify, showToast, debounce } from '../src/utils/helpers.js';
import { PlayerStatus, Visibility, PaginationDefault } from '../src/utils/enums.js';

const ctx = mountAdminLayout({ title: 'จัดการผู้เล่น' });
if (ctx) {
  const { content, session } = ctx;
  const teams = await TeamService.list();
  let page = 1;
  let query = '';
  let teamFilterVal = '';

  content.innerHTML = `
    <div class="table-toolbar">
      <h2 style="font-size:1.2rem" class="m-0">รายการผู้เล่น</h2>
      <button class="btn btn-felt btn-sm" id="addBtn"><i class="bi bi-plus-lg me-1"></i>เพิ่มผู้เล่น</button>
    </div>
    <div class="table-toolbar">
      <div class="table-toolbar__filters">
        <input class="form-control form-control-sm" style="width:220px" placeholder="ค้นหาชื่อผู้เล่น..." id="searchInput">
        <select class="form-select form-select-sm" style="width:180px" id="teamFilter"><option value="">ทุกทีม</option>${teams.map((t) => `<option value="${t.id}">${t.name}</option>`).join('')}</select>
      </div>
    </div>
    <div class="app-card p-0"><table class="app-table">
      <thead><tr><th>ชื่อ</th><th>ทีม</th><th>เลขประจำตัว</th><th>สถานะ</th><th></th></tr></thead>
      <tbody id="rows"></tbody>
    </table></div>
    <div class="d-flex justify-content-end mt-3" id="pager"></div>`;

  function formHtml(p = {}) {
    return `
      <div class="row g-2 mb-3">
        <div class="col-6"><label class="form-label">ชื่อ <span class="req">*</span></label><input class="form-control" id="f_first" value="${p.firstName || ''}"></div>
        <div class="col-6"><label class="form-label">นามสกุล <span class="req">*</span></label><input class="form-control" id="f_last" value="${p.lastName || ''}"></div>
      </div>
      <div class="mb-3"><label class="form-label">ทีม <span class="req">*</span></label>
        <select class="form-select" id="f_team">${teams.map((t) => `<option value="${t.id}" ${p.teamId === t.id ? 'selected' : ''}>${t.name}</option>`).join('')}</select></div>
      <div class="row g-2 mb-3">
        <div class="col-6"><label class="form-label">เลขประจำตัว</label><input class="form-control" id="f_sid" value="${p.studentId || ''}"></div>
        <div class="col-6"><label class="form-label">สถานะ</label><select class="form-select" id="f_status">${Object.values(PlayerStatus).map((s) => `<option ${p.status === s ? 'selected' : ''}>${s}</option>`).join('')}</select></div>
      </div>`;
  }

  function openForm(existing) {
    openModal({
      title: existing ? 'แก้ไขผู้เล่น' : 'เพิ่มผู้เล่นใหม่',
      bodyHtml: formHtml(existing || {}),
      buttons: [
        { label: 'ยกเลิก', variant: 'btn-outline-secondary' },
        { label: 'บันทึก', variant: 'btn-felt', close: false, onClick: async () => {
          const firstName = document.getElementById('f_first').value.trim();
          const lastName = document.getElementById('f_last').value.trim();
          if (!firstName || !lastName) { showToast('กรุณากรอกชื่อ-นามสกุล', 'error'); return; }
          const teamId = document.getElementById('f_team').value;
          const team = await TeamService.get(teamId);
          const displayName = `${firstName} ${lastName}`;
          const data = {
            firstName, lastName, displayName, teamId, tournamentId: team?.tournamentId,
            slug: existing?.slug || slugify(`${displayName}-${Date.now().toString(36).slice(-4)}`),
            studentId: document.getElementById('f_sid').value.trim(),
            status: document.getElementById('f_status').value,
            visibility: Visibility.PUBLIC,
          };
          if (existing) await PlayerService.update(existing.id, data, session.adminId);
          else await PlayerService.create(data, session.adminId);
          showToast('บันทึกสำเร็จ'); closeModal(); await render();
        }},
      ],
    });
  }

  async function render() {
    let rows = await PlayerService.list();
    if (query) rows = rows.filter((p) => p.displayName.toLowerCase().includes(query.toLowerCase()));
    if (teamFilterVal) rows = rows.filter((p) => p.teamId === teamFilterVal);
    const { rows: pageRows, totalPages, page: safePage } = paginate(rows, page, PaginationDefault.ADMIN_PAGE_SIZE);
    page = safePage;

    const trs = await Promise.all(pageRows.map(async (p) => {
      const team = await TeamService.get(p.teamId);
      return `<tr>
        <td class="fw-semibold text-dark">${p.displayName}</td>
        <td class="small">${team?.name || '-'}</td>
        <td class="font-mono small">${p.studentId || '-'}</td>
        <td>${statusPill(p.status)}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-secondary" data-edit="${p.id}"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger" data-hide="${p.id}"><i class="bi bi-eye-slash"></i></button>
        </td>
      </tr>`;
    }));
    document.getElementById('rows').innerHTML = trs.length ? trs.join('') : emptyRow(5, 'ไม่พบผู้เล่น');

    renderPagination(document.getElementById('pager'), { page, totalPages }, (p) => { page = p; render(); });
    document.querySelectorAll('[data-edit]').forEach((b) => b.addEventListener('click', async () => openForm(await PlayerService.get(b.dataset.edit))));
    document.querySelectorAll('[data-hide]').forEach((b) => b.addEventListener('click', () => {
      confirmModal({ message: 'ซ่อนผู้เล่นนี้หรือไม่?', onConfirm: async () => { await PlayerService.hide(b.dataset.hide, session.adminId); showToast('ซ่อนแล้ว'); await render(); } });
    }));
  }
  document.getElementById('addBtn').addEventListener('click', () => openForm());
  document.getElementById('searchInput').addEventListener('input', debounce((e) => { query = e.target.value; page = 1; render(); }, 200));
  document.getElementById('teamFilter').addEventListener('change', (e) => { teamFilterVal = e.target.value; page = 1; render(); });
  await render();
}
</script>
</body>
</html>
