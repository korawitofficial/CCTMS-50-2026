<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จัดการ Tournament — CCTMS Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/admin.css">
</head>
<body>
<script type="module">
import { mountAdminLayout } from '../src/components/adminLayout.js';
import { TournamentService } from '../src/services/TournamentService.js';
import { EventService } from '../src/services/EventService.js';
import { TeamService } from '../src/services/TeamService.js';
import { statusPill, openModal, closeModal, confirmModal, emptyRow } from '../src/components/ui.js';
import { slugify, showToast } from '../src/utils/helpers.js';
import { TournamentStatus, GameType, Visibility } from '../src/utils/enums.js';

const ctx = mountAdminLayout({ title: 'จัดการ Tournament' });
if (ctx) {
  const { content, session } = ctx;
  const events = await EventService.list();

  content.innerHTML = `
    <div class="table-toolbar">
      <h2 style="font-size:1.2rem" class="m-0">รายการ Tournament</h2>
      <button class="btn btn-felt btn-sm" id="addBtn"><i class="bi bi-plus-lg me-1"></i>เพิ่ม Tournament</button>
    </div>
    <div class="app-card p-0"><table class="app-table">
      <thead><tr><th>ชื่อ Tournament</th><th>ประเภท</th><th>ทีม</th><th>สถานะ</th><th></th></tr></thead>
      <tbody id="rows"></tbody>
    </table></div>`;

  function formHtml(t = {}) {
    return `
      <div class="mb-3"><label class="form-label">Event <span class="req">*</span></label>
        <select class="form-select" id="f_event">${events.map((e) => `<option value="${e.id}" ${t.eventId === e.id ? 'selected' : ''}>${e.name}</option>`).join('')}</select></div>
      <div class="mb-3"><label class="form-label">ชื่อ Tournament <span class="req">*</span></label><input class="form-control" id="f_name" value="${t.name || ''}"></div>
      <div class="mb-3"><label class="form-label">ประเภทเกม</label>
        <select class="form-select" id="f_game">${Object.values(GameType).map((g) => `<option ${t.gameType === g ? 'selected' : ''}>${g}</option>`).join('')}</select></div>
      <div class="mb-3"><label class="form-label">คำอธิบาย</label><textarea class="form-control" id="f_desc" rows="2">${t.description || ''}</textarea></div>
      <div class="mb-1"><label class="form-label">สถานะ</label>
        <select class="form-select" id="f_status">${Object.values(TournamentStatus).map((s) => `<option ${t.status === s ? 'selected' : ''}>${s}</option>`).join('')}</select></div>`;
  }

  function openForm(existing) {
    openModal({
      title: existing ? 'แก้ไข Tournament' : 'เพิ่ม Tournament ใหม่',
      bodyHtml: formHtml(existing || {}),
      buttons: [
        { label: 'ยกเลิก', variant: 'btn-outline-secondary' },
        { label: 'บันทึก', variant: 'btn-felt', close: false, onClick: async () => {
          const name = document.getElementById('f_name').value.trim();
          if (!name) { showToast('กรุณากรอกชื่อ Tournament', 'error'); return; }
          const data = {
            eventId: document.getElementById('f_event').value,
            name, slug: existing?.slug || slugify(name),
            gameType: document.getElementById('f_game').value,
            description: document.getElementById('f_desc').value.trim(),
            status: document.getElementById('f_status').value,
            visibility: Visibility.PUBLIC,
          };
          if (existing) await TournamentService.update(existing.id, data, session.adminId);
          else await TournamentService.create(data, session.adminId);
          showToast('บันทึกสำเร็จ'); closeModal(); await render();
        }},
      ],
    });
  }

  async function render() {
    const rows = await TournamentService.list();
    const trs = await Promise.all(rows.map(async (t) => {
      const teams = await TeamService.list({ tournamentId: t.id });
      return `<tr>
        <td><div class="fw-semibold text-dark">${t.name}</div></td>
        <td>${t.gameType}</td>
        <td>${teams.length}</td>
        <td>${statusPill(t.status)}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-secondary" data-edit="${t.id}"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger" data-hide="${t.id}"><i class="bi bi-eye-slash"></i></button>
        </td>
      </tr>`;
    }));
    document.getElementById('rows').innerHTML = trs.length ? trs.join('') : emptyRow(5, 'ยังไม่มี Tournament');
    document.querySelectorAll('[data-edit]').forEach((b) => b.addEventListener('click', async () => openForm(await TournamentService.get(b.dataset.edit))));
    document.querySelectorAll('[data-hide]').forEach((b) => b.addEventListener('click', () => {
      confirmModal({ message: 'ซ่อน Tournament นี้จากหน้าเว็บสาธารณะหรือไม่?', onConfirm: async () => { await TournamentService.hide(b.dataset.hide, session.adminId); showToast('ซ่อนแล้ว'); await render(); } });
    }));
  }
  document.getElementById('addBtn').addEventListener('click', () => openForm());
  await render();
}
</script>
</body>
</html>
