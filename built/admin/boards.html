<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จัดการกระดาน — CCTMS Admin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/admin.css">
</head>
<body>
<script type="module">
import { mountAdminLayout } from '../src/components/adminLayout.js';
import { BoardService } from '../src/services/BoardService.js';
import { HallService } from '../src/services/HallService.js';
import { MatchService } from '../src/services/MatchService.js';
import { PlayerService } from '../src/services/PlayerService.js';
import { statusPill, openModal, closeModal, emptyRow } from '../src/components/ui.js';
import { showToast } from '../src/utils/helpers.js';

const ctx = mountAdminLayout({ title: 'จัดการกระดาน' });
if (ctx) {
  const { content, session } = ctx;
  const halls = await HallService.list();

  content.innerHTML = `
    <div class="table-toolbar">
      <h2 style="font-size:1.2rem" class="m-0">รายการกระดาน</h2>
      <button class="btn btn-felt btn-sm" id="addBtn"><i class="bi bi-plus-lg me-1"></i>เพิ่มกระดาน</button>
    </div>
    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-4 g-3" id="grid"></div>`;

  async function render() {
    const boards = await BoardService.list();
    if (!boards.length) { document.getElementById('grid').innerHTML = `<div class="col-12">${emptyRow(1, 'ยังไม่มีกระดาน')}</div>`; return; }
    const cards = await Promise.all(boards.map(async (b) => {
      const match = b.currentMatchId ? await MatchService.get(b.currentMatchId) : null;
      const hall = await HallService.get(b.hallId);
      let playersLine = '<div class="small text-soft">ว่าง</div>';
      if (match) {
        const [white, black] = await Promise.all([PlayerService.get(match.whitePlayerId), PlayerService.get(match.blackPlayerId)]);
        playersLine = `<div class="small text-soft">${white?.displayName || '-'} vs ${black?.displayName || '-'}</div>`;
      }
      return `<div class="col"><div class="app-card p-3">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <div><div class="fw-semibold text-dark">${b.name}</div><div class="small text-soft">${hall?.name || '-'}</div></div>
          ${statusPill(b.status)}
        </div>
        ${playersLine}
      </div></div>`;
    }));
    document.getElementById('grid').innerHTML = cards.join('');
  }

  document.getElementById('addBtn').addEventListener('click', async () => {
    const boardCount = (await BoardService.list()).length;
    openModal({
      title: 'เพิ่มกระดาน',
      bodyHtml: `
        <div class="mb-3"><label class="form-label">ห้องแข่งขัน <span class="req">*</span></label>
          <select class="form-select" id="f_hall">${halls.map((h) => `<option value="${h.id}">${h.name}</option>`).join('')}</select></div>
        <div class="mb-3"><label class="form-label">ชื่อกระดาน <span class="req">*</span></label><input class="form-control" id="f_name"></div>
        <div class="mb-1"><label class="form-label">หมายเลขกระดาน</label><input type="number" class="form-control" id="f_num" value="${boardCount + 1}"></div>`,
      buttons: [{ label: 'ยกเลิก', variant: 'btn-outline-secondary' }, { label: 'บันทึก', variant: 'btn-felt', close: false, onClick: async () => {
        const name = document.getElementById('f_name').value.trim();
        if (!name) { showToast('กรุณากรอกชื่อกระดาน', 'error'); return; }
        await BoardService.create({ name, hallId: document.getElementById('f_hall').value, boardNumber: Number(document.getElementById('f_num').value) }, session.adminId);
        showToast('บันทึกสำเร็จ'); closeModal(); await render();
      }}],
    });
  });

  await render();
  BoardService.subscribe({}, render);
  MatchService.subscribe({}, render);
}
</script>
</body>
</html>
