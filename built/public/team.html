<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายละเอียดทีม — CCTMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/main.css">
</head>
<body>
<main><section class="section" id="teamSection"><div class="container-xl"><div class="skeleton" style="height:300px;border-radius:16px"></div></div></section></main>
<script type="module">
import { mountPublicLayout, emptyState } from '../src/components/publicLayout.js';
import { TeamService } from '../src/services/TeamService.js';
import { PlayerService } from '../src/services/PlayerService.js';
import { MatchService } from '../src/services/MatchService.js';
import { ResultService } from '../src/services/ResultService.js';
import { StatisticsService } from '../src/services/StatisticsService.js';
import { statusPill } from '../src/components/ui.js';
import { getQueryParam } from '../src/utils/helpers.js';

await mountPublicLayout({ breadcrumb: [{ label: 'หน้าแรก', href: 'index.html' }, { label: 'ทีม', href: 'teams.html' }, { label: 'รายละเอียด' }] });

const slug = getQueryParam('slug');
const team = await TeamService.getBySlug(slug);
const section = document.getElementById('teamSection');

if (!team) {
  section.innerHTML = `<div class="container-xl">${emptyState('ไม่พบทีมนี้', 'bi-exclamation-circle')}</div>`;
} else {
  const players = await PlayerService.list({ teamId: team.id });
  const stat = await StatisticsService.forTeam(team.id);
  const allMatches = await MatchService.list({});
  const matches = allMatches.filter((m) => m.whiteTeamId === team.id || m.blackTeamId === team.id);
  const matchRows = await Promise.all(matches.map(async (m) => {
    const result = await ResultService.get(m.id);
    return `<tr>
      <td><a href="match.html?id=${m.id}" class="text-dark text-decoration-none">Match #${m.id.split('_')[1]}</a></td>
      <td>${statusPill(m.status)}</td>
      <td>${result ? result.resultType : '-'}</td>
    </tr>`;
  }));

  section.innerHTML = `<div class="container-xl">
    <div class="app-card p-4 mb-4 d-flex align-items-center gap-4 flex-wrap">
      <div class="rounded-circle flex-shrink-0" style="width:72px;height:72px;background:${team.color}"></div>
      <div class="flex-grow-1">
        <h1 style="font-size:1.6rem" class="mb-1">${team.name}</h1>
        <div class="text-soft small">${team.school || ''} · ${players.length} ผู้เล่น</div>
      </div>
      <div class="d-flex gap-3 text-center">
        <div><div class="fs-4 fw-bold text-success">${stat?.win ?? 0}</div><div class="small text-soft">ชนะ</div></div>
        <div><div class="fs-4 fw-bold text-soft">${stat?.draw ?? 0}</div><div class="small text-soft">เสมอ</div></div>
        <div><div class="fs-4 fw-bold" style="color:var(--color-lacquer)">${stat?.lose ?? 0}</div><div class="small text-soft">แพ้</div></div>
        <div><div class="fs-4 fw-bold" style="color:var(--color-brass)">${stat?.winRate ?? 0}%</div><div class="small text-soft">อัตราชนะ</div></div>
      </div>
    </div>
    <div class="row g-4">
      <div class="col-lg-5">
        <h3 style="font-size:1.15rem" class="mb-3">รายชื่อผู้เล่น</h3>
        <div class="d-flex flex-column gap-2">${players.map((p) => `
          <a href="player.html?slug=${p.slug}" class="app-card p-3 d-flex justify-content-between align-items-center text-decoration-none">
            <span class="text-dark fw-medium">${p.displayName}</span>${statusPill(p.status)}
          </a>`).join('') || emptyState('ยังไม่มีผู้เล่น')}</div>
      </div>
      <div class="col-lg-7">
        <h3 style="font-size:1.15rem" class="mb-3">ประวัติการแข่งขัน</h3>
        <div class="app-card p-0">
          <table class="app-table"><thead><tr><th>คู่แข่งขัน</th><th>สถานะ</th><th>ผล</th></tr></thead><tbody>
          ${matchRows.length ? matchRows.join('') : `<tr><td colspan="3">${emptyState('ยังไม่มีประวัติการแข่งขัน')}</td></tr>`}
          </tbody></table>
        </div>
      </div>
    </div>
  </div>`;
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
