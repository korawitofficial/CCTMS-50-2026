<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หอเกียรติยศ — CCTMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/main.css">
</head>
<body>
<main>
  <section class="py-5 text-center" style="background:var(--color-felt-dark);border-bottom:3px solid var(--color-brass)">
    <div class="container-xl">
      <i class="bi bi-trophy-fill" style="font-size:2.5rem;color:var(--color-brass)"></i>
      <h1 class="text-white mt-2" style="font-size:1.8rem">หอเกียรติยศ</h1>
      <p class="text-white-50 mb-0">เกียรติประวัติของทีมและนักกีฬาผู้สร้างชื่อเสียง</p>
    </div>
  </section>
  <section class="section"><div class="container-xl"><div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4" id="hofGrid"></div></div></section>
</main>
<script type="module">
import { mountPublicLayout, emptyState } from '../src/components/publicLayout.js';
import { HallOfFameService } from '../src/services/HallOfFameService.js';
import { TeamService } from '../src/services/TeamService.js';
import { PlayerService } from '../src/services/PlayerService.js';

await mountPublicLayout({ breadcrumb: [{ label: 'หน้าแรก', href: 'index.html' }, { label: 'หอเกียรติยศ' }] });

const items = await HallOfFameService.list();
const grid = document.getElementById('hofGrid');
if (!items.length) {
  grid.innerHTML = `<div class="col-12">${emptyState('ยังไม่มีข้อมูลหอเกียรติยศ', 'bi-award')}</div>`;
} else {
  const cards = await Promise.all(items.map(async (h) => {
    const target = h.targetType === 'Team' ? await TeamService.get(h.targetId) : await PlayerService.get(h.targetId);
    return `<div class="col"><div class="app-card p-4 text-center h-100">
      <i class="bi bi-award-fill fs-1 mb-3" style="color:var(--color-brass)"></i>
      <div class="app-card__eyebrow mb-1">${h.title}</div>
      <h3 style="font-size:1.1rem" class="mb-2">${target?.name || target?.displayName || '-'}</h3>
      <p class="text-soft small mb-0">${h.description || ''}</p>
    </div></div>`;
  }));
  grid.innerHTML = cards.join('');
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
