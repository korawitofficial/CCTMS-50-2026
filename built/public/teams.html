<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ทีมทั้งหมด — CCTMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/main.css">
</head>
<body>
<main>
  <section class="py-4" style="background:var(--surface-2);border-bottom:1px solid var(--color-line)">
    <div class="container-xl"><h1 style="font-size:1.8rem" class="mb-1">ทีมทั้งหมด</h1><p class="text-soft mb-0">รายชื่อทีมที่เข้าร่วมการแข่งขัน</p></div>
  </section>
  <section class="section">
    <div class="container-xl">
      <input type="search" class="form-control mb-4" style="max-width:280px" placeholder="ค้นหาทีม..." id="searchInput">
      <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-4 g-3" id="teamGrid"></div>
    </div>
  </section>
</main>
<script type="module">
import { mountPublicLayout, emptyState } from '../src/components/publicLayout.js';
import { TeamService } from '../src/services/TeamService.js';
import { PlayerService } from '../src/services/PlayerService.js';
import { StatisticsService } from '../src/services/StatisticsService.js';
import { debounce } from '../src/utils/helpers.js';

await mountPublicLayout({ breadcrumb: [{ label: 'หน้าแรก', href: 'index.html' }, { label: 'ทีม' }] });

const all = await TeamService.list({ publicOnly: true });
const grid = document.getElementById('teamGrid');
const searchInput = document.getElementById('searchInput');

async function cardHtml(t) {
  const [stat, players] = await Promise.all([StatisticsService.forTeam(t.id), PlayerService.list({ teamId: t.id })]);
  return `<div class="col"><a href="team.html?slug=${t.slug}" class="text-decoration-none">
    <div class="app-card app-card--hoverable p-4 text-center h-100">
      <div class="mx-auto mb-3 rounded-circle" style="width:56px;height:56px;background:${t.color}"></div>
      <div class="fw-semibold text-dark mb-1">${t.name}</div>
      <div class="small text-soft mb-2">${players.length} ผู้เล่น</div>
      <div class="small"><span class="text-success">${stat?.win ?? 0}W</span> · <span class="text-soft">${stat?.draw ?? 0}D</span> · <span style="color:var(--color-lacquer)">${stat?.lose ?? 0}L</span></div>
    </div>
  </a></div>`;
}
async function render() {
  const q = searchInput.value.trim().toLowerCase();
  const rows = q ? all.filter((t) => t.name.toLowerCase().includes(q)) : all;
  if (!rows.length) { grid.innerHTML = `<div class="col-12">${emptyState('ไม่พบทีมที่ค้นหา', 'bi-search')}</div>`; return; }
  grid.innerHTML = (await Promise.all(rows.map(cardHtml))).join('');
}
searchInput.addEventListener('input', debounce(render, 200));
await render();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
