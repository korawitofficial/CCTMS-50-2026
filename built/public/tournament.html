<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายละเอียดการแข่งขัน — CCTMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/main.css">
</head>
<body>
<main>
  <section id="tourHero" class="py-5" style="background:var(--color-felt);border-bottom:3px solid var(--color-brass)"></section>
  <section class="section">
    <div class="container-xl">
      <ul class="nav nav-tabs mb-4" id="tourTabs">
        <li class="nav-item"><button class="nav-link active" data-tab="schedule">ตารางแข่งขัน</button></li>
        <li class="nav-item"><button class="nav-link" data-tab="teams">ทีม</button></li>
        <li class="nav-item"><button class="nav-link" data-tab="players">ผู้เล่น</button></li>
        <li class="nav-item"><button class="nav-link" data-tab="boards">กระดาน</button></li>
        <li class="nav-item"><button class="nav-link" data-tab="stats">สถิติ</button></li>
      </ul>
      <div id="tabContent"></div>
    </div>
  </section>
</main>
<script type="module">
import { mountPublicLayout, emptyState } from '../src/components/publicLayout.js';
import { TournamentService } from '../src/services/TournamentService.js';
import { TeamService } from '../src/services/TeamService.js';
import { PlayerService } from '../src/services/PlayerService.js';
import { BoardService } from '../src/services/BoardService.js';
import { RoundService } from '../src/services/RoundService.js';
import { StatisticsService } from '../src/services/StatisticsService.js';
import { RankingService } from '../src/services/RankingService.js';
import { statusPill } from '../src/components/ui.js';
import { getQueryParam } from '../src/utils/helpers.js';

await mountPublicLayout({ breadcrumb: [{ label: 'หน้าแรก', href: 'index.html' }, { label: 'การแข่งขัน', href: 'tournaments.html' }, { label: 'รายละเอียด' }] });

const slug = getQueryParam('slug');
const tournament = await TournamentService.getBySlug(slug);
const hero = document.getElementById('tourHero');

if (!tournament) {
  hero.innerHTML = `<div class="container-xl">${emptyState('ไม่พบการแข่งขันนี้', 'bi-exclamation-circle')}</div>`;
} else {
  const teams = await TeamService.list({ tournamentId: tournament.id });
  hero.innerHTML = `<div class="container-xl text-white">
    <div class="d-flex align-items-center gap-2 mb-2">${statusPill(tournament.status)}<span class="small text-white-50">${tournament.gameType}</span></div>
    <h1 class="text-white mb-2">${tournament.name}</h1>
    <p class="text-white-50 mb-0" style="max-width:60ch">${tournament.description || ''}</p>
    <div class="d-flex gap-4 mt-3 small text-white-50"><span><i class="bi bi-people me-1"></i>${teams.length} ทีม</span></div>
  </div>`;
}

const tabs = document.querySelectorAll('#tourTabs button');
const content = document.getElementById('tabContent');

async function scheduleTab() {
  const rounds = tournament ? await RoundService.list() : [];
  if (!rounds.length) return emptyState('ยังไม่มีตารางการแข่งขัน', 'bi-calendar3');
  return `<div class="d-flex flex-column gap-3">${rounds.map((r) => `
    <div class="app-card p-3 d-flex justify-content-between align-items-center">
      <div><div class="fw-semibold text-dark">${r.name}</div><div class="small text-soft">รอบที่ ${r.roundNumber}</div></div>
      ${statusPill(r.status)}
    </div>`).join('')}</div>`;
}

async function teamsTab() {
  const teams = tournament ? await TeamService.list({ tournamentId: tournament.id }) : [];
  if (!teams.length) return emptyState('ยังไม่มีทีมลงทะเบียน', 'bi-people');
  const cards = await Promise.all(teams.map(async (t) => {
    const players = await PlayerService.list({ teamId: t.id });
    return `<div class="col"><a href="team.html?slug=${t.slug}" class="text-decoration-none">
      <div class="app-card app-card--hoverable p-3 text-center h-100">
        <div class="mx-auto mb-2 rounded-circle" style="width:48px;height:48px;background:${t.color}"></div>
        <div class="fw-semibold text-dark">${t.name}</div>
        <div class="small text-soft">${players.length} ผู้เล่น</div>
      </div>
    </a></div>`;
  }));
  return `<div class="row row-cols-1 row-cols-sm-2 row-cols-lg-4 g-3">${cards.join('')}</div>`;
}

async function playersTab() {
  const players = tournament ? await PlayerService.list({ tournamentId: tournament.id }) : [];
  if (!players.length) return emptyState('ยังไม่มีผู้เล่นลงทะเบียน', 'bi-person-badge');
  const rows = await Promise.all(players.map(async (p) => {
    const team = await TeamService.get(p.teamId);
    return `<tr>
      <td><a href="player.html?slug=${p.slug}" class="text-dark fw-medium text-decoration-none">${p.displayName}</a></td>
      <td>${team?.name || '-'}</td><td>${statusPill(p.status)}</td>
    </tr>`;
  }));
  return `<div class="app-card p-0"><table class="app-table"><thead><tr><th>ชื่อ</th><th>ทีม</th><th>สถานะ</th></tr></thead><tbody>${rows.join('')}</tbody></table></div>`;
}

async function boardsTab() {
  const boards = await BoardService.list();
  if (!boards.length) return emptyState('ยังไม่มีกระดาน', 'bi-grid-3x3');
  return `<div class="row row-cols-2 row-cols-md-4 g-3">${boards.map((b) => `
    <div class="col"><a href="live.html" class="text-decoration-none"><div class="app-card p-3 text-center">
      <div class="fw-semibold text-dark">${b.name}</div>${statusPill(b.status)}
    </div></a></div>`).join('')}</div>`;
}

async function statsTab() {
  const rankings = tournament ? await RankingService.list({ tournamentId: tournament.id }) : [];
  if (!rankings.length) return emptyState('ยังไม่มีข้อมูลสถิติ', 'bi-bar-chart');
  const rows = await Promise.all(rankings.map(async (r) => {
    const team = await TeamService.get(r.targetId);
    const stat = await StatisticsService.forTeam(r.targetId);
    return `<tr>
      <td><span class="rank-num ${r.rank === 1 ? 'rank-num--gold' : ''}">#${r.rank}</span></td>
      <td>${team?.name || '-'}</td><td class="text-end">${stat?.totalMatch ?? 0}</td><td class="text-end">${stat?.win ?? 0}</td><td class="text-end">${stat?.draw ?? 0}</td><td class="text-end">${stat?.lose ?? 0}</td>
      <td class="text-end fw-bold">${r.score}</td>
    </tr>`;
  }));
  return `<div class="app-card p-0"><table class="app-table"><thead><tr><th>อันดับ</th><th>ทีม</th><th class="text-end">แข่ง</th><th class="text-end">ชนะ</th><th class="text-end">เสมอ</th><th class="text-end">แพ้</th><th class="text-end">คะแนน</th></tr></thead><tbody>${rows.join('')}</tbody></table></div>`;
}

const renderers = { schedule: scheduleTab, teams: teamsTab, players: playersTab, boards: boardsTab, stats: statsTab };

async function activate(tabName) {
  tabs.forEach((t) => t.classList.toggle('active', t.dataset.tab === tabName));
  content.innerHTML = '<div class="skeleton" style="height:200px;border-radius:12px"></div>';
  content.innerHTML = await renderers[tabName]();
}
tabs.forEach((t) => t.addEventListener('click', () => activate(t.dataset.tab)));
await activate('schedule');
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
