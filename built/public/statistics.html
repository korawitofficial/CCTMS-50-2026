<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สถิติการแข่งขัน — CCTMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/main.css">
</head>
<body>
<main>
  <section class="py-4" style="background:var(--surface-2);border-bottom:1px solid var(--color-line)">
    <div class="container-xl"><h1 style="font-size:1.8rem" class="mb-1">สถิติการแข่งขัน</h1><p class="text-soft mb-0">อันดับทีมและอัตราชนะ-เสมอ-แพ้</p></div>
  </section>
  <section class="section">
    <div class="container-xl">
      <div class="app-card p-0" id="statsTableWrap"></div>
    </div>
  </section>
</main>
<script type="module">
import { mountPublicLayout, emptyState } from '../src/components/publicLayout.js';
import { TournamentService } from '../src/services/TournamentService.js';
import { TeamService } from '../src/services/TeamService.js';
import { RankingService } from '../src/services/RankingService.js';
import { StatisticsService } from '../src/services/StatisticsService.js';

await mountPublicLayout({ breadcrumb: [{ label: 'หน้าแรก', href: 'index.html' }, { label: 'สถิติ' }] });

const tournament = (await TournamentService.list({ publicOnly: true }))[0];
const wrap = document.getElementById('statsTableWrap');

async function render() {
  const rankings = tournament ? await RankingService.list({ tournamentId: tournament.id }) : [];
  if (!rankings.length) { wrap.innerHTML = emptyState('ยังไม่มีข้อมูลสถิติ', 'bi-bar-chart'); return; }
  const rows = await Promise.all(rankings.map(async (r) => {
    const team = await TeamService.get(r.targetId);
    const stat = await StatisticsService.forTeam(r.targetId);
    return `<tr>
      <td><span class="rank-num ${r.rank === 1 ? 'rank-num--gold' : ''}">#${r.rank}</span></td>
      <td><a href="team.html?slug=${team?.slug}" class="d-flex align-items-center gap-2 text-decoration-none"><span class="player-chip__swatch" style="background:${team?.color}"></span><span class="text-dark fw-medium">${team?.name || '-'}</span></a></td>
      <td class="text-end">${stat?.totalMatch ?? 0}</td>
      <td class="text-end text-success">${stat?.win ?? 0}</td>
      <td class="text-end text-soft">${stat?.draw ?? 0}</td>
      <td class="text-end" style="color:var(--color-lacquer)">${stat?.lose ?? 0}</td>
      <td class="text-end">${stat?.winRate ?? 0}%</td>
      <td class="text-end fw-bold">${r.score}</td>
    </tr>`;
  }));
  wrap.innerHTML = `<table class="app-table">
    <thead><tr><th>อันดับ</th><th>ทีม</th><th class="text-end">แข่ง</th><th class="text-end">ชนะ</th><th class="text-end">เสมอ</th><th class="text-end">แพ้</th><th class="text-end">อัตราชนะ</th><th class="text-end">คะแนน</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}
await render();
RankingService.subscribe({}, render);
StatisticsService.subscribe({}, render);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
