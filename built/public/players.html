<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผู้เล่นทั้งหมด — CCTMS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../src/styles/main.css">
</head>
<body>
<main>
  <section class="py-4" style="background:var(--surface-2);border-bottom:1px solid var(--color-line)">
    <div class="container-xl"><h1 style="font-size:1.8rem" class="mb-1">ผู้เล่นทั้งหมด</h1><p class="text-soft mb-0">รายชื่อนักกีฬาที่เข้าร่วมการแข่งขัน</p></div>
  </section>
  <section class="section">
    <div class="container-xl">
      <div class="d-flex gap-2 flex-wrap mb-4">
        <input type="search" class="form-control" style="max-width:280px" placeholder="ค้นหาผู้เล่น..." id="searchInput">
        <select class="form-select" style="max-width:200px" id="teamFilter"></select>
      </div>
      <div class="app-card p-0"><table class="app-table" id="playerTable"><thead><tr><th>ชื่อ</th><th>ทีม</th><th>เลขประจำตัว</th><th>สถานะ</th></tr></thead><tbody id="playerBody"></tbody></table></div>
    </div>
  </section>
</main>
<script type="module">
import { mountPublicLayout, emptyState } from '../src/components/publicLayout.js';
import { PlayerService } from '../src/services/PlayerService.js';
import { TeamService } from '../src/services/TeamService.js';
import { statusPill } from '../src/components/ui.js';
import { debounce } from '../src/utils/helpers.js';

await mountPublicLayout({ breadcrumb: [{ label: 'หน้าแรก', href: 'index.html' }, { label: 'ผู้เล่น' }] });

const all = await PlayerService.list({ publicOnly: true });
const teams = await TeamService.list({ publicOnly: true });
const teamFilter = document.getElementById('teamFilter');
teamFilter.innerHTML = `<option value="">ทุกทีม</option>` + teams.map((t) => `<option value="${t.id}">${t.name}</option>`).join('');

const searchInput = document.getElementById('searchInput');
const body = document.getElementById('playerBody');

async function render() {
  const q = searchInput.value.trim().toLowerCase();
  let rows = all;
  if (q) rows = rows.filter((p) => p.displayName.toLowerCase().includes(q));
  if (teamFilter.value) rows = rows.filter((p) => p.teamId === teamFilter.value);
  if (!rows.length) { body.innerHTML = `<tr><td colspan="4">${emptyState('ไม่พบผู้เล่นที่ค้นหา', 'bi-search')}</td></tr>`; return; }
  const trs = await Promise.all(rows.map(async (p) => {
    const team = await TeamService.get(p.teamId);
    return `<tr>
      <td><a href="player.html?slug=${p.slug}" class="text-dark fw-medium text-decoration-none">${p.displayName}</a></td>
      <td>${team?.name || '-'}</td><td class="font-mono">${p.studentId || '-'}</td><td>${statusPill(p.status)}</td>
    </tr>`;
  }));
  body.innerHTML = trs.join('');
}
searchInput.addEventListener('input', debounce(render, 200));
teamFilter.addEventListener('change', render);
await render();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
